<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeBook</title>
  <meta name="description" content="A simple recipe book page featuring a warm apple crisp recipe.">

  <!-- Open Graph (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="RecipeBook">
  <meta property="og:description" content="A simple recipe book page featuring a warm apple crisp recipe.">
  <meta property="og:url" content="https://johnhanks03.github.io/WDD-131/recipes/">
  <meta property="og:image" content="images/social-preview.png">

  <!-- X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RecipeBook">
  <meta name="twitter:description" content="A simple recipe book page featuring a warm apple crisp recipe.">
  <meta name="twitter:image" content="images/social-preview.png">

  <!-- One favicon (ICO works everywhere) -->
  <link rel="icon" href="/favicon.ico">

  <!-- One Apple Touch Icon (iOS home screen) -->
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="recipes.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="images/recipe-book.png" alt="Recipe book logo" class="brand-logo">
      <h1>RecipeBook</h1>
    </div>
  </header>

  <main class="page-content">
    <section class="search-section">
      <form class="search-form" action="#" method="get">
        <input type="search" name="q" placeholder="Find a recipe" aria-label="Find a recipe">
        <button type="submit" aria-label="Search">
          <img src="images/search.svg" alt="Search icon">
        </button>
      </form>
    </section>

    <section class="recipe-card">
      <div class="recipe-image">
        <img src="images/apple-crisp.jpg" alt="Apple crisp served in a bowl">
      </div>

      <div class="recipe-info">
        <p class="tag">Dessert</p>

        <h2>Apple Crisp</h2>

        <span
          class="rating"
          role="img"
          aria-label="Rating: 4 out of 5 stars"
        >
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star-empty">☆</span>
        </span>

        <p class="description">
          This apple crisp recipe is a simple yet delicious fall dessert that's perfect served warm with vanilla ice cream.
        </p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
      Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">
      <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
      <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
      <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
      <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>
  </footer>
</body>
</html>
